allowedStages:
  - PROD
  - CODE
deployments:
  llama-cpp:
    type: aws-s3
    regions:
      - eu-west-1
    stacks:
      - deploy
    app: llama-cpp
    parameters:
      bucketSsmLookup: true
      publicReadAcl: false
      cacheControl: 'max-age=0, no-cache'
      bucketSsmKeyStageParam:
        PROD: /PROD/deploy/amigo/amigo.data.bucket
        CODE: /CODE/deploy/amigo/amigo.data.bucket
